<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Category</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border-radius: 12px;
        }

        .form-label {
            font-weight: 500;
        }

        .required {
            color: red;
        }
    </style>
</head>
<body>
{% block content %}
 {% include 'html/message.html' %}
<div class="container-sm mt-5">
    
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Categories</h2>
        <a href="#" class="btn btn-outline-primary">Home</a>
    </div>

    <!-- Card -->
    <div class="card shadow p-4">
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <!-- Category Name -->
            <div class="mb-3">
                <label class="form-label">Name <span class="required">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Enter category name" required>
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
                <label class="form-label">Image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description <span class="required">*</span></label>
                <textarea name="description" rows="3" class="form-control" placeholder="Enter category description" required></textarea>
            </div>

            <!-- Status -->
            <!-- <div class="mb-3 form-check">
                <input type="checkbox" name="is_active"  class="form-check-input" id="status">
                <label class="form-check-label" for="status">
                    Hidden (Check to hide category)
                </label>
            </div> -->

            <!-- Trending -->
            <!-- <div class="mb-3 form-check">
                <input type="checkbox" name="trending" class="form-check-input" id="trending">
                <label class="form-check-label" for="trending">
                    Trending Category
                </label>
            </div> -->

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
                <button type="reset" class="btn btn-warning me-2">Reset</button>
                <button type="submit" class="btn btn-success">Add Category</button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
</body>
</html>
